<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invito Chiara</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<section id="cover">

<div class="overlay"></div>

<div class="envelope">

<div class="seal" onclick="openInvitation()">
💮
</div>

<h1>Chiara</h1>

<p>Clicca sul sigillo per aprire l'invito</p>

</div>

</section>

<section id="invitation">

<div class="card">

<h1>Chiara</h1>

<h2>Ti aspetto</h2>

<p class="date">
11 Agosto 2026
</p>

<p class="hour">
Ore 20:00
</p>

<a class="button"
href="https://maps.google.com"
target="_blank">

📍 Location

</a>

<div class="dressSeal"
onclick="showDressCode()">

Dress Code

</div>

</div>

</section>

<section id="dress">

<div class="card">

<h1>Dress Code</h1>

<h2>Comme ve piace a vuje</h2>

<button onclick="backInvitation()">

← Torna all'invito

</button>

</div>

</section>

<script src="script.js"></script>

</body>
</html>
